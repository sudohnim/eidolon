###############################################################################
# flake8 configuration
###############################################################################

[flake8]
max-line-length = 88
# E203/W503/W504: Black-compatible whitespace rules
# E501: line length handled by Black; long LLM prompt strings are intentional
ignore = W503,W504,E203,E226,E231
per-file-ignores =
    # prompts.py contains long LLM prompt strings — line length is intentional
    eidolon/agent/prompts.py:E501
    # nodes.py contains long correlation/digest builder lines — pre-existing
    eidolon/agent/nodes.py:E501
    # privacy_url_lookup.py has long docstring lines — intentional
    eidolon/tools/privacy_url_lookup.py:E501
    # report.py builds long string literals for markdown/PDF output
    eidolon/agent/report.py:E501
exclude =
    .git,
    .tox,
    .venv,
    __pycache__,
    output,
    .mypy_cache,
    .pytest_cache
